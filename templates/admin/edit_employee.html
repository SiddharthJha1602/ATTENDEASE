{% extends "base.html" %}

{% block title %}Edit Employee{% endblock %}
{% block page_title %}Edit Employee{% endblock %}

{% block content %}

<div class="activity-card">

    <h3>Edit Employee</h3>

    <form method="POST">

        <div class="mb-3">
            <label>Full Name</label>
            <input type="text"
                   name="full_name"
                   value="{{ employee.full_name }}"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   value="{{ employee.email }}"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Department</label>
            <input type="text"
                   name="department"
                   value="{{ employee.department }}"
                   class="form-control"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary">
            Update Employee
        </button>

    </form>

</div>

{% endblock %}
