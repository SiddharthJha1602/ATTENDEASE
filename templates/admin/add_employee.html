{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="page-header mb-4">
        <h2>Add Employee</h2>
    </div>

    <div class="card">
        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Full Name</label>
                    <input type="text"
                           name="full_name"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Username</label>
                    <input type="text"
                           name="username"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Password</label>
                    <input type="password"
                           name="password"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Department</label>
                    <input type="text"
                           name="department"
                           class="form-control">
                </div>

                <button type="submit"
                        class="btn btn-primary">
                    Add Employee
                </button>

            </form>

        </div>
    </div>

</div>

{% endblock %}
